# Per-language section order and labels for the site-wide header.
#
# Each language has the same logical order of sections but labels in
# the language's own script. Last entry is the "↑ home" link.
#
# The header at docs/_includes/header.html iterates these and bolds
# the entry whose key matches the current page's `section` front-matter.

en:
  sections: [install, usage, formats, audit, security, build-audit]
  labels:
    - install
    - usage
    - formats
    - audit
    - security
    - build audit
    - "↑ home"

